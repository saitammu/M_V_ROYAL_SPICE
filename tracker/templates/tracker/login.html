<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Login — MVRS</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'Segoe UI',sans-serif;padding:16px}
.box{background:#fff;border-radius:16px;padding:32px 28px;width:100%;max-width:360px;box-shadow:0 12px 40px rgba(0,0,0,.4)}
.logo{text-align:center;margin-bottom:20px}
.logo .icon{font-size:2.4rem}
.logo h1{font-size:1.3rem;font-weight:800;color:#1a1a2e;margin-top:6px}
.logo p{color:#888;font-size:.84rem;margin-top:2px}
.tabs{display:flex;background:#f0f2f5;border-radius:10px;padding:4px;margin-bottom:22px;gap:4px}
.tab{flex:1;text-align:center;padding:8px;border-radius:8px;border:none;cursor:pointer;font-size:.86rem;font-weight:600;transition:all .2s;background:transparent;color:#888}
.tab.active{background:#1a1a2e;color:#fff;box-shadow:0 2px 6px rgba(0,0,0,.2)}
label{display:block;font-size:.78rem;color:#555;margin-bottom:5px;font-weight:600;margin-top:12px}
input{width:100%;padding:11px 13px;border:1.5px solid #ddd;border-radius:8px;font-size:.92rem;outline:none;transition:border .2s;-webkit-appearance:none}
input:focus{border-color:#e94560}
button[type=submit]{width:100%;padding:12px;background:#e94560;color:#fff;border:none;border-radius:8px;font-size:.95rem;font-weight:700;cursor:pointer;margin-top:18px;transition:background .2s}
button[type=submit]:hover{background:#c73652}
.err{background:#fdecea;color:#c0392b;padding:9px 12px;border-radius:8px;font-size:.82rem;margin-bottom:14px;text-align:center}
.back{display:block;text-align:center;margin-top:14px;color:#aaa;font-size:.8rem;text-decoration:none}
.back:hover{color:#e94560}
#staffSection{display:none}
</style>
</head>
<body>
<div class="box">
  <div class="logo">
    <div class="icon">🍛</div>
    <h1>MV Royal Spice</h1>
    <p>Restaurant Management System</p>
  </div>

  {% if error %}<div class="err">{{ error }}</div>{% endif %}

  <div class="tabs">
    <button class="tab active" onclick="switchTab('admin')" id="tabAdmin">🔐 Admin</button>
    <button class="tab" onclick="switchTab('staff')" id="tabStaff">👥 Staff</button>
  </div>

  <!-- Admin login -->
  <div id="adminSection">
    <form method="post">{% csrf_token %}
      <input type="hidden" name="role" value="admin">
      <label>Admin Password</label>
      <input type="password" name="password" placeholder="Enter admin password" autofocus>
      <button type="submit">Login as Admin</button>
    </form>
  </div>

  <!-- Staff login -->
  <div id="staffSection">
    <form method="post">{% csrf_token %}
      <input type="hidden" name="role" value="staff">
      <label>Staff Password</label>
      <input type="password" name="password" placeholder="Enter staff password">
      <button type="submit" style="background:#27ae60">Enter Staff Portal</button>
    </form>
  </div>
</div>

<script>
function switchTab(tab){
  document.getElementById('adminSection').style.display=tab==='admin'?'block':'none';
  document.getElementById('staffSection').style.display=tab==='staff'?'block':'none';
  document.getElementById('tabAdmin').className='tab'+(tab==='admin'?' active':'');
  document.getElementById('tabStaff').className='tab'+(tab==='staff'?' active':'');
}
// Auto-switch to staff tab if it was a staff error
{% if error and 'staff' in request.POST.role %}switchTab('staff');{% endif %}
</script>
</body>
</html>
